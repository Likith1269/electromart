<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<nav class="navbar">

<div class="logo">

⚡ ElectroMart

</div>

<ul>

<li><a href="customer.html">🛍 Products</a></li>

<li><a href="cart.html">🛒 Cart</a></li>

</ul>

</nav>

<section class="checkout-page">

<h1 class="checkout-heading">

💳 Secure Checkout

</h1>

<p class="checkout-subtitle">

Complete your order securely.

</p>

<div class="checkout-layout">

<!-- LEFT -->

<div class="checkout-form">

<h2>📍 Delivery Details</h2>

<input type="text" id="name" placeholder="👤 Full Name">

<input type="text" id="phone" placeholder="📞 Phone Number">

<input type="email" id="email" placeholder="📧 Email">

<textarea id="address" placeholder="🏠 Delivery Address"></textarea>

<div class="row">

<input type="text" id="city" placeholder="🏙 City">

<input type="text" id="pincode" placeholder="📮 PIN Code">

</div>

<h2>💳 Payment Method</h2>

<select id="payment">

<option>Cash On Delivery</option>

<option>UPI</option>

<option>Credit Card</option>

<option>Debit Card</option>

<option>Net Banking</option>

</select>

</div>

<!-- RIGHT -->

<div class="checkout-summary">

<h2>🧾 Order Summary</h2>

<div id="checkoutItems"></div>

<hr>

<div class="summary-row">

<span>Delivery</span>

<span style="color:green;">FREE</span>

</div>

<div class="summary-row">

<span>Discount</span>

<span style="color:red;">-₹100</span>

</div>

<div class="summary-total">

<span>Grand Total</span>

<span id="totalAmount"></span>

</div>

<button class="checkout-btn" onclick="placeOrder()">

🛍 Place Order

</button>

</div>

</div>

</section>

<script src="checkout.js"></script>

</body>

</html>
